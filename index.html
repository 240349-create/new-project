<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой облачный проект</title>
    <style>
        /* Стили из этапа IV [cite: 50, 53, 54] */
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f4; }
        .form-container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #f4b400; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: #dfa400; }
    </style>
</head>
<body>

<div class="form-container">
    <h3>Отправить заявку</h3>
    <form id="feedbackForm">
        <input type="text" id="userName" placeholder="Имя" required>
        <input type="email" id="userEmail" placeholder="Ваш Email" required>
        <button type="submit">Отправить в облако</button>
    </form>
</div>

<script type="module">
    // Импорт модулей Firebase [cite: 88, 90]
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // Твои ключи конфигурации из документа [cite: 94, 99-104]
    const firebaseConfig = {
        apiKey: "Alza5y06178b_0y5vb07gTr4130hLESSbuYQ",
        authDomain: "enter-65457.firebaseapp.com",
        projectId: "enter-65457",
        storageBucket: "enter-65457.firebasestorage.app",
        messagingSenderId: "672982968171",
        appId: "1:672982968171:web:c2364626880751e7f4a6"
    };

    // Инициализация Firebase и Firestore [cite: 107, 109]
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Логика обработки формы [cite: 151-178]
    document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const nameInput = document.getElementById("userName").value;
        const emailInput = document.getElementById("userEmail").value;

        try {
            // Запись данных в коллекцию "requests" [cite: 160, 187]
            await addDoc(collection(db, "requests"), {
                name: nameInput,
                email: emailInput,
                timestamp: new Date()
            });
            
            alert("Готово! Данные сохранены в Firebase.");
            document.getElementById("feedbackForm").reset();
        } catch (error) {
            console.error("Ошибка записи: ", error);
            alert("Ошибка при отправке.");
        }
    });
</script>

</body>
</html>
