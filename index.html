<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS / Reactive App</title>
    <style>
        /* Стили из твоей методички [cite: 851-859] */
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background-color: #f8f9fa; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); margin-bottom: 20px;}
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 8px; }
        .post { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #eee; width: 500px; position: relative; }
        .time { font-size: 11px; color: #999; float: right; }
        .like-btn { background: #f0f0f0; color: #333; width: auto; padding: 5px 15px; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h3>Панель управления данными</h3>
    <form id="feedbackForm">
        <input type="text" id="userName" placeholder="Имя профиля" required>
        <input type="email" id="userEmail" placeholder="Рабочий Email" required>
        <button type="submit" id="submitBtn">Опубликовать в облако</button>
    </form>
</div>

<div id="feed"></div> <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = { 
      apiKey: "AIzaSyBQPOi6fkk4UH64785hTqpgDqAW_NYMTZ4", 
      authDomain: "new-project-addf2.firebaseapp.com", 
      projectId: "new-project-addf2", 
      storageBucket: "new-project-addf2.firebasestorage.app", 
      messagingSenderId: "1013363206844", 
      appId: "1:1013363206844:web:f5f47e1ff0fadeaefc3eb9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Функция для лайков [cite: 913, 918]
    window.processLike = async (docId) => {
        const docRef = doc(db, "requests", docId);
        await updateDoc(docRef, {
            likes: increment(1)
        });
    };

    // Отправка данных [cite: 957, 976]
    document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("submitBtn");
        btn.disabled = true;

        try {
            await addDoc(collection(db, "requests"), {
                name: document.getElementById("userName").value,
                email: document.getElementById("userEmail").value,
                likes: 0,
                timestamp: serverTimestamp()
            });
            document.getElementById("feedbackForm").reset();
        } catch (e) {
            alert("Ошибка доступа!");
        } finally {
            btn.disabled = false;
        }
    });

    // Real-time лента (то, что у тебя не работало) [cite: 980-988]
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const feedContainer = document.getElementById("feed");
        feedContainer.innerHTML = ""; // Очистка ленты перед отрисовкой
        
        snapshot.forEach((doc) => {
            const data = doc.data();
            const time = data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : "...";
            
            feedContainer.innerHTML += `
                <div class="post">
                    <span class="time">${time}</span>
                    <p><b>${data.name}</b></p>
                    <p>${data.email}</p>
                    <button class="like-btn" onclick="processLike('${doc.id}')">
                        👍 ${data.likes || 0}
                    </button>
                </div>
            `;
        });
    });
</script>

</body>
</html>
